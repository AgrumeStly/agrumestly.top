<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgrumeStly 的网站</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8c291, #e77f67);
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 20px 40px 20px;
            background-color: rgba(255,255,255,0.1);
        }

        header h1 {
            font-size: 3rem;
            color: #fff;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.2rem;
            color: #fdf6f0;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            gap: 40px;
            flex-wrap: wrap;
        }

        .card {
            background-color: rgba(255,255,255,0.85);
            border-radius: 20px;
            padding: 30px 40px;
            text-align: center;
            width: 250px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: #333;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 1rem;
            color: #555;
        }

        footer {
            text-align: center;
            padding: 20px;
            background-color: rgba(0,0,0,0.1);
            color: #fff;
        }

        @media (max-width: 600px) {
            main {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>AgrumeStly.top</h1>
        <p id="hitokoto">
            <a href="#" id="hitokoto_text">:D 获取中...喵</a>
        </p>
    </header>

    <main>
        <a class="card" href="https://blog.agrumestly.top" target="_blank">
            <h2>📖 博客</h2>
        </a>

        <a class="card" href="https://maj.agrumestly.top" target="_blank">
            <h2>🎴 日麻点数计算器</h2>
        </a>
    </main>

    <footer>
        © 2025 AgrumeStly. All rights reserved.
    </footer>
    <script src="https://v1.hitokoto.cn/?encode=js&select=%23hitokoto" defer></script>
</body>
